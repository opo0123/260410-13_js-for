<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 - for 3 - 배열</title>
  </head>
  <body>
    <script>
      let arr = ["바나나", "사과", "오렌지", "포도", "망고"];
      console.log(arr); // 배열 확인
      // console.log(arr.length); // arr의 속성(length) 표시 - arr의 데이터 개수
      for (let i = 0; i < arr.length; i++) {
        console.log(i);
        console.log(arr[i]); //[]- 인덱스 번호
        document.write(`${arr[i]}<br>`); // i번째 데이터 가져오기
      }
    </script>
  </body>
</html>
