<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 - for 2 - 구구단</title>
  </head>
  <body>
    <script>
      // 구구단
      // 2 ~ 9단 표시
      for (let i = 2; i <= 9; i++) {
        // console.log(i);
        document.write(`<h3>${i}단</h3>`);

        // i X 1 ~ 9 = 0 표시
        for (let j = 1; j <= 9; j++) {
          console.log(j);
          document.write(`${i}X${j} = ${i*j}<br>`);
        }
      }
    </script>
  </body>
</html>
