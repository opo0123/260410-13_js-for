<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 - for 3 - 배열list 적용</title>
  </head>
  <body>
    <h1>상품 리스트</h1>
    <ul id="list">
      <!-- js출력 -->
      <!-- <li>사과</li>
      <li>바나나</li>
      <li>딸기</li> -->
    </ul>

    <script>
      const products = ["사과", "바나나", "딸기"];
      // console.log(products);
      const proList = document.querySelector("#list");

      for (i = 0; i < products.length; i++) {
        // console.log(i);
        proList.innerHTML += `<li>${products[i]}</li>` // += : 기존 내용 + 새로운 내용 붙이기
      }
    </script>
  </body>
</html>
